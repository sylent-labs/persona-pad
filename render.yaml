services:
  - type: web
    name: persona-pad-backend
    runtime: docker
    plan: free
    # Build context is the repo root so git-crypt can see .git and the
    # top-level .gitattributes when decrypting persona data at start.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      # Base64-encoded git-crypt symmetric key. Generate with:
      #   git-crypt export-key /tmp/persona-pad.key
      #   base64 < /tmp/persona-pad.key
      # Paste the output as the value in the Render dashboard. sync: false
      # keeps it out of this file.
      - key: GIT_CRYPT_KEY_B64
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PERSONA_PAD_LOG_LEVEL
        value: INFO
